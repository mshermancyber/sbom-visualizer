###############################################################################
# nginx.conf — main config for the `web` image (TLS reverse proxy + SPA host)
#
# Terminates TLS on :443, redirects :80 -> :443, serves the built frontend SPA,
# and reverse-proxies /api/ to the internal `api` service on :8000.
###############################################################################

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging --------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ---- General --------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;              # do not leak nginx version
    client_max_body_size 32m;         # allow large SBOM uploads via /api/parse

    # ---- Compression ----------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        application/wasm;

    # ---- TLS (modern) ---------------------------------------------------
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;     # let the (modern) client pick for TLS1.3
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    include /etc/nginx/conf.d/*.conf;
}

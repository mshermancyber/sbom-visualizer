###############################################################################
# default.conf — server blocks (loaded via http{} include conf.d/*.conf)
#
#   :80   -> 301 redirect to https://$host$request_uri  (forced HTTPS)
#   :443  -> TLS, SPA static host + /api/ reverse proxy to api:8000
###############################################################################

# ---- HTTP: redirect everything to HTTPS ------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # Force HTTPS for every request, preserving host + path + query.
    # ${PUBLIC_HTTPS_PORT} is substituted at container start (envsubst) so the redirect
    # lands on the externally-published HTTPS port even when it isn't 443.
    return 301 https://$host:${PUBLIC_HTTPS_PORT}$request_uri;
}

# ---- HTTPS: TLS termination, SPA, /api proxy -------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name _;

    # Certificates are mounted (read-only), never baked into the image.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- Security headers (applied to all responses on this server) --------
    # HSTS: 2 years, include subdomains. Browsers ignore this over plain HTTP.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-Frame-Options           "DENY"        always;
    add_header Referrer-Policy           "no-referrer" always;
    # CSP: everything is same-origin. Chart.js/D3 are npm-bundled by Vite into
    # /assets/*.js, so 'self' covers all scripts. Vite injects inline styles and
    # may inline tiny module preloads, hence 'unsafe-inline' for style only.
    # connect-src 'self' covers the /api XHR/fetch calls (same origin via proxy).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ---- API reverse proxy -------------------------------------------------
    location /api/ {
        proxy_pass http://api:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Upstream timeouts (SBOM scans hit external APIs server-side and can
        # take a while). Tunable via container env at deploy time if needed.
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffering off;   # stream responses (e.g. large reports) promptly
    }

    # ---- SPA static assets -------------------------------------------------
    # Hashed Vite build assets are immutable; cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- SPA history-API fallback ------------------------------------------
    location / {
        try_files $uri /index.html;
    }
}
